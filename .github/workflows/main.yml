name: Bot Doctor (全链路体检 Pro)

on:
  schedule:
    - cron: '30 * * * *' # 每小时的第30分钟运行
  workflow_dispatch: # 允许手动点击运行

# 必须的权限，用于读取 Action 历史
permissions:
  actions: read
  contents: read

jobs:
  full_body_check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 🕵️‍♂️【升级版】动态查询上一次体检结果，不怕文件名改动
      - name: Check Last Run Status
        id: last_run
        uses: actions/github-script@v7
        with:
          script: |
            try {
              const { owner, repo } = context.repo;
              
              // 1. 动态获取当前运行的 Workflow ID (彻底解决文件名不匹配问题)
              const currentRun = await github.rest.actions.getWorkflowRun({
                owner,
                repo,
                run_id: context.runId
              });
              const workflowId = currentRun.data.workflow_id;
              console.log(`🔍 当前工作流 ID: ${workflowId}`);
              
              // 2. 查询该工作流最近一次【已完成】的记录
              const { data } = await github.rest.actions.listWorkflowRuns({
                owner,
                repo,
                workflow_id: workflowId,
                status: 'completed',
                per_page: 1
              });
              
              if (data.workflow_runs.length > 0) {
                const lastRun = data.workflow_runs[0];
                console.log(`⏱️ 上次运行结果: ${lastRun.conclusion} (运行编号: ${lastRun.id})`);
                if (lastRun.conclusion === 'failure') {
                  core.setOutput('was_failure', 'true');
                  console.log('🚨 标记：上次体检挂了，如果本次成功将触发恢复通知。');
                } else {
                  core.setOutput('was_failure', 'false');
                }
              } else {
                console.log('ℹ️ 未找到历史记录。');
                core.setOutput('was_failure', 'false');
              }
            } catch (err) {
              console.error('❌ 查询历史记录报错:', err);
              core.setOutput('was_failure', 'false');
            }

      - name: Install Dependencies
        run: npm install axios xml2js

      # 🛠️ 生成体检脚本
      - name: Create Diagnosis Script
        run: |
          cat << 'EOF' > doctor.js
          const axios = require("axios");
          const xml2js = require("xml2js");
          const fs = require("fs");

          const API_URL = process.env.API_URL;
          const TIMEOUT = 30000; 

          // 🔑 使用你的管理员ID，避开限流
          const ADMIN_ID = "o4UNGw6r9OL9q_4jRAfed_jnvXh8";

          async function testFeature(featureName, command, expectedKeywords) {
            console.log(`\n----------------------------------------`);
            console.log(`🩺 [检测]: ${featureName}`);
            
            const payload = `
              <xml>
                <ToUserName><![CDATA[gh_monitor]]></ToUserName>
                <FromUserName><![CDATA[${ADMIN_ID}]]></FromUserName> 
                <CreateTime>${Math.floor(Date.now() / 1000)}</CreateTime>
                <MsgType><![CDATA[text]]></MsgType>
                <Content><![CDATA[${command}]]></Content>
              </xml>
            `;

            try {
              const res = await axios.post(API_URL, payload, {
                headers: { "Content-Type": "text/xml" },
                timeout: TIMEOUT
              });

              if (res.status !== 200) throw new Error(`HTTP ${res.status}`);

              const parser = new xml2js.Parser({ explicitArray: false });
              const result = await parser.parseStringPromise(res.data);
              const reply = (result && result.xml && result.xml.Content) ? result.xml.Content : "";

              const passed = expectedKeywords.some(k => reply.includes(k));
              
              if (passed) {
                console.log(`✅ [通过]`);
                return true;
              } else {
                console.error(`❌ [失败] 回复不匹配`);
                console.log("回复摘要:", reply.replace(/\n/g, " ").substring(0, 100));
                return false;
              }
            } catch (err) {
              console.error(`🚑 [错误] ${err.message}`);
              return false;
            }
          }

          (async () => {
            console.log("🏥 体检开始...");
            if (!API_URL) {
              console.error("❌ 未配置 API_URL");
              process.exit(1);
            }

            const failedItems = [];

            // 1. 测查价
            if (!await testFeature("价格查询", "价格 微信", ["价格", "免费", "内购"])) {
              failedItems.push("查价服务");
            }

            // 2. 测榜单
            if (!await testFeature("榜单获取", "榜单 美国", ["1、", "1.", "Top 10", "1，"])) {
              failedItems.push("榜单服务");
            }

            // 3. 测系统更新
            if (!await testFeature("系统更新", "系统更新", ["iOS", "版本", "iPadOS"])) {
              failedItems.push("更新服务");
            }

            if (failedItems.length > 0) {
              const summary = failedItems.join(" + ") + " 异常";
              console.error(`\n❌ 体检不通过: ${summary}`);
              const encodedError = encodeURIComponent(summary);
              try {
                fs.appendFileSync(process.env.GITHUB_OUTPUT, `fail_summary=${encodedError}\n`);
              } catch (e) {}
              process.exit(1);
            } else {
              console.log(`\n🎉 所有功能正常`);
              process.exit(0);
            }
          })();
          EOF

      # 🚀 执行体检
      - name: Run Diagnosis
        id: diagnosis
        env:
          API_URL: 'https://apple.290935.xyz/api/wechat'
        run: node doctor.js

      # ❌ 失败报警
      - name: Bark Notification (Failure)
        if: failure()
        run: |
          ERROR_MSG="${{ steps.diagnosis.outputs.fail_summary }}"
          if [ -z "$ERROR_MSG" ]; then ERROR_MSG="未知错误"; fi
          curl "https://api.day.app/${{ secrets.BARK_KEY }}/❌体检挂了/${ERROR_MSG}?group=BotDoctor&icon=https://github.githubassets.com/favicons/favicon-failure.svg&level=critical"

      # ✅ 恢复通知
      - name: Bark Notification (Recovery)
        if: success() && steps.last_run.outputs.was_failure == 'true'
        run: |
          curl "https://api.day.app/${{ secrets.BARK_KEY }}/✅服务已恢复/体检各项指标恢复正常，系统健康状态良好。?group=BotDoctor&icon=https://github.githubassets.com/favicons/favicon-success.svg&level=active"
